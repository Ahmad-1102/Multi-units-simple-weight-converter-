<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Weight Converter</title>
    </head>
    <body>
        <div class="all">
            <select class="js-unit-from-select unit-from-select">
                <option value="KG">Kilogram</option>
                <option value="G">Gram</option>
                <option value="LB">Pound</option>
                <option value="MG">Milligram</option>
                <option value="OZ">Ounce</option>
                <option value="T">Tonne</option>
                <option value="STONE">Stone</option>
                <option value="DG">Decigram</option>
                <option value="CG">Centigram</option>
                <option value="MIC-G">Microgram</option>
                <option value="GR">Grain</option>
                <option value="DRAM">Dram</option>
                <option value="T-OZ">Troy ounce</option>
                <option value="SH-T">Short tonne</option>
                <option value="LO-T">Long tonne</option>
                <option value="JIN">Jin</option>
                <option value="TAEL">Tael</option>
                <option value="MITHQAL">Mithqal</option>
                <option value="AR-LB">Arabic pound</option>
                <option value="MAUND">Maund</option>
            </select>
            <select class="js-unit-to-select unit-to-select">
                <option value="KG">Kilogram</option>
                <option value="G">Gram</option>
                <option value="LB">Pound</option>
                <option value="MG">Milligram</option>
                <option value="OZ">Ounce</option>
                <option value="T">Tonne</option>
                <option value="STONE">Stone</option>
                <option value="DG">Decigram</option>
                <option value="CG">Centigram</option>
                <option value="MIC-G">Microgram</option>
                <option value="GR">Grain</option>
                <option value="DRAM">Dram</option>
                <option value="T-OZ">Troy ounce</option>
                <option value="SH-T">Short tonne</option>
                <option value="LO-T">Long tonne</option>
                <option value="JIN">Jin</option>
                <option value="TAEL">Tael</option>
                <option value="MITHQAL">Mithqal</option>
                <option value="AR-LB">Arabic pound</option>
                <option value="MAUND">Maund</option>
            </select>
            <input type="number" placeholder="Weight" class="js-weight-input weight-input">
            <button class="convert-btn">Convert</button>
                <div class="result-css">
                    <p class="js-result"></p>
                </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
